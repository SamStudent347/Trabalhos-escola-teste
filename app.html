<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile App Interface</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            text-align: center;
            background-color: #4CAF50;
            color: white;
            padding: 15px;
        }
        .main {
            flex: 1;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
        }
        .footer {
            display: flex;
            justify-content: space-around;
            background-color: #4CAF50;
            padding: 10px;
        }
        .footer button {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
        .logout {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #f44336;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Welcome, User!</h1>
        </div>
        <div class="main">
            <p>Your Name: <strong>John Doe</strong></p>
            <button class="logout">Logout</button>
        </div>
        <div class="footer">
            <button>Home</button>
            <button>Search</button>
            <button>Settings</button>
        </div>
    </div>
</body>
</html>
